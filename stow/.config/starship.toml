"$schema" = 'https://starship.rs/config-schema.json'

format = """
$username\
$hostname\
$directory\
$git_branch\
$git_state\
$git_status\
$cmd_duration\
$line_break\
$python\
$rust\
$golang\
$status\
$container\
$character"""

[directory]
truncation_length = 3
style = "blue"
read_only = " ro"
use_os_path_sep = true
format = '[$path]($style)[$read_only]($read_only_style) '

[character]
success_symbol = "[>](purple)"
error_symbol = "[>](red)"
vimcmd_symbol = "[<](green)"

[git_branch]
format = "[$branch]($style)"
style = "bright-black"

[hostname]
ssh_only = false
format = "[$hostname]($style) "

[username]
format = "[$user]($style) on "
show_always = true

[git_status]
format = "[[(*$conflicted$untracked$modified$staged$renamed$deleted)](218) ($ahead_behind$stashed)]($style)"
style = "cyan"
conflicted = "X${count}‚Äã"
untracked = "?${count}‚Äã"
modified = "‚Äã!${count}"
staged = "‚Äã+${count}"
renamed = "‚Äãr${count}"
deleted = "‚Äã‚úï${count}"
stashed = "‚â°${count}"

[git_metrics]
format = '([+$added]($added_style))([-$deleted]($deleted_style))'
added_style = 'italic dimmed green'
deleted_style = 'italic dimmed red'
ignore_submodules = true
disabled = false

[git_state]
format = '\([$state( $progress_current/$progress_total)]($style)\) '
style = "bright-black"

[cmd_duration]
format = "[$duration]($style) "
style = "yellow"

[rust]
format = "[$symbol$version]($style) "
symbol = "rust "

[golang]
symbol = "‚à© "
format = " go [$symbol($version )]($style)"

[docker_context]
symbol = "‚óß "
format = " docker [$symbol$context]($style)"

[python]
format = "[$virtualenv]($style) "
style = "bright-black"
detect_extensions = []
detect_files = []
